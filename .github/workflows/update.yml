name: Update BuitKing's Loadouts

on:
  schedule:
    - cron: '30 5 * * *'  # Elke dag om 05:30 UTC (07:30 NL zomertijd)
  workflow_dispatch:        # Ook handmatig te starten via GitHub

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v5

      - name: Python instellen
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Dependencies installeren
        run: |
          pip install -r requirements.txt
          playwright install chromium --with-deps

      - name: Scraper draaien
        run: python wz_update_all.py

      - name: Gewijzigde HTML committen
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html buitking_update.log
          git diff --cached --quiet || git commit -m "Auto-update loadouts $(date +'%d/%m/%Y %H:%M')"
          git push
